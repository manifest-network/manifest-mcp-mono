name: E2E (PR)

# Runs on EVERY PR (no `on.paths` filter) so the required `e2e-gate` job below always posts a
# status. A path-filtered REQUIRED check would never report on a docs-only PR → merge deadlock.
# The expensive live job is instead gated by the `changes` job + a job-level `if`.
on:
  pull_request:

# Cancel superseded runs on the same PR (bound cost).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN (checkout needs read; the live job's submodule fetch uses the ssh-key).
permissions:
  contents: read

jobs:
  changes:
    # Native change detection (replaces the old on.pull_request.paths). Cheap: a checkout + one git
    # diff. Outputs whether a deploy-relevant path changed.
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need the base commit to diff against
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        # RUNTIME deploy-dependency closure of the acceptance flow — not just the TS import graph.
        #   TS graph:  the acceptance app imports ONLY @manifest-network/manifest-sdk + manifestjs
        #     → core + fred + agent-core + sdk (lease / chain / node are NOT in it).
        #   LIVE graph: the compose devnet builds the chain from submodules/manifest-ledger and the
        #     provider from submodules/fred — a submodule-pointer bump (submodules/**) OR a submodule
        #     URL/branch switch (.gitmodules) alters the devnet build. Both are in the closure.
        run: |
          set -euo pipefail
          # Capture in a STANDALONE command so a git diff error FAILS this job (→ e2e-gate reds),
          # rather than silently routing to the else branch (deploy=false) and false-greening the gate.
          files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          if printf '%s\n' "$files" | grep -Eq \
            '^(packages/(core|fred|agent-core|sdk)/|examples/sdk-acceptance/|e2e/|submodules/|\.gitmodules$|package\.json$|package-lock\.json$|\.github/workflows/e2e-pr\.yml$)'; then
            echo 'deploy=true' >> "$GITHUB_OUTPUT"
          else
            echo 'deploy=false' >> "$GITHUB_OUTPUT"
          fi

  acceptance-single:
    needs: changes
    # Run the live variant ONLY when a deploy-relevant path changed, on a same-repo non-Dependabot PR.
    # FORK PRs get empty secrets → skip. Dependabot PRs are same-repo but ALSO get no secrets, so the
    # SSH submodule checkout would hard-fail — exclude them too. `github.actor` (not `triggering_actor`)
    # is deliberate: it stays 'dependabot[bot]' on a human re-run, so the skip holds.
    if: >-
      needs.changes.outputs.deploy == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.FRED_DEPLOY_KEY }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Build Docker images
        run: docker compose -f e2e/docker-compose.yml build

      - name: Start devnet
        run: docker compose -f e2e/docker-compose.yml up -d --wait --wait-timeout 180

      - name: Install and build
        run: npm ci && npm run build

      # Single variant only (stack + full matrix stay nightly, e2e.yml). The pretest:e2e hook builds
      # @manifest-network/sdk-acceptance; the trailing ':' pins the single-service it, not a substring.
      - name: Run the single-variant SDK acceptance flow
        run: npm run test:e2e -- e2e/sdk-acceptance.e2e.test.ts -t "single-service:"

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f e2e/docker-compose.yml logs > e2e-logs.txt

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-pr-logs
          path: e2e-logs.txt

      - name: Teardown
        if: always()
        run: docker compose -f e2e/docker-compose.yml down -v --remove-orphans

  e2e-gate:
    # THE REQUIRED CHECK. Runs on EVERY PR (if: always(), so it runs even when acceptance-single was
    # skipped) → it always posts a status, so requiring it never deadlocks a merge. RED when the
    # change-detection job did not succeed (a broken filter would falsely skip the live job) OR the
    # live job failed/cancelled. GREEN when the live job passed OR was correctly skipped as
    # not-applicable (docs-only / fork / Dependabot).
    needs: [changes, acceptance-single]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on change-detection + the acceptance result
        env:
          CHANGES: ${{ needs.changes.result }}
          ACCEPTANCE: ${{ needs.acceptance-single.result }}
        run: |
          echo "changes: $CHANGES | acceptance-single: $ACCEPTANCE"
          if [ "$CHANGES" != 'success' ]; then
            echo "::error::change-detection job did not succeed ($CHANGES) — cannot trust the gate"
            exit 1
          fi
          if [ "$ACCEPTANCE" = 'failure' ] || [ "$ACCEPTANCE" = 'cancelled' ]; then
            echo '::error::live single-variant acceptance e2e failed'
            exit 1
          fi
          echo 'OK (acceptance passed or not applicable to this PR)'
