name: E2E
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          ssh-key: ${{ secrets.FRED_DEPLOY_KEY }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Provision loopback XFS (project quotas) for retention volumes
        run: |
          set -euo pipefail
          sudo mkdir -p /mnt/fred-xfs
          truncate -s 2G /tmp/fred-xfs.img          # > mkfs.xfs 300MB floor
          sudo mkfs.xfs -f /tmp/fred-xfs.img
          sudo mount -o loop,prjquota /tmp/fred-xfs.img /mnt/fred-xfs
          sudo chmod 0777 /mnt/fred-xfs
          xfs_quota -x -c 'state -p' /mnt/fred-xfs   # fail loudly if project quota isn't active

      - name: Build Docker images
        run: docker compose -f e2e/docker-compose.yml build

      - name: Start devnet
        run: docker compose -f e2e/docker-compose.yml up -d --wait --wait-timeout 180

      - name: Install and build
        run: npm ci && npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f e2e/docker-compose.yml logs > e2e-logs.txt

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: e2e-logs.txt

      - name: Teardown
        if: always()
        run: docker compose -f e2e/docker-compose.yml down -v --remove-orphans
