name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # The SDK build runs publint + attw (esm-only, level=error) as part of tsdown.
      # Run it explicitly so the package-export / type-resolution gate is a named,
      # visible CI step (the root build above covers it transitively). (ENG-309)
      - run: npm run build -w @manifest-network/manifest-sdk
      - run: npm run lint
      - run: npm run check
      # dependency-cruiser DAG + manifestjs-type chokepoint + no-static-node/undici guards (ENG-309).
      # The brand-cast / no-parse*-in-lcd-adapter grep guards + the known-bad fixtures' proof run as
      # part of `npm test` (packages/sdk/scripts/cast-guard.test.ts).
      - run: npm run depcruise
      - run: npm test
