name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write
  id-token: write # required for npm provenance (OIDC signing)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Validate npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured. Add it in Settings > Secrets > Actions."
            exit 1
          fi
          NPM_USER=$(npm whoami 2>&1) || {
            echo "::error::NPM_TOKEN is set but authentication failed. The token may be expired or revoked."
            echo "::error::npm whoami output: $NPM_USER"
            exit 1
          }
          echo "Authenticated to npm as: $NPM_USER"

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm run check

      - run: npm test

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish() {
            local ws="$1" pkg="$2" ver="$3"
            if npm view "${pkg}@${ver}" version >/dev/null 2>&1; then
              echo "::warning::${pkg}@${ver} already published, skipping"
              return 0
            fi
            npm publish --workspace "$ws" --provenance --access public
          }
          VERSION=$(node -p "require('./package.json').version")
          publish packages/core  @manifest-network/manifest-mcp-core  "$VERSION"
          publish packages/chain @manifest-network/manifest-mcp-chain "$VERSION"
          publish packages/lease @manifest-network/manifest-mcp-lease "$VERSION"
          publish packages/fred  @manifest-network/manifest-mcp-fred  "$VERSION"
          publish packages/node  @manifest-network/manifest-mcp-node  "$VERSION"

      - name: Create GitHub Release
        id: gh_release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes

      - name: Warn if GitHub Release failed
        if: steps.gh_release.outcome == 'failure'
        run: |
          echo "::warning::All packages were published to npm, but GitHub Release creation failed."
          echo "::warning::Create the release manually: gh release create $GITHUB_REF_NAME --generate-notes"
